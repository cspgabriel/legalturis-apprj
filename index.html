<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LegiRJ - Leis e Decretos do Rio de Janeiro</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h1>⚖️ LegiRJ</h1>
                <p>Leis e Decretos do Rio de Janeiro</p>
            </div>
            <div class="header-ads">
                <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px"
                     data-ad-client="ca-pub-xxxxxxxxxxxxxxxx" data-ad-slot="xxxxxxxx"></ins>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Seção de Busca e Filtros -->
        <section class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Buscar lei, decreto, número...">
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label>Categoria:</label>
                    <select id="categoryFilter">
                        <option value="">Todas</option>
                        <option value="tributaria">Tributária</option>
                        <option value="ambiental">Ambiental</option>
                        <option value="trabalhista">Trabalhista</option>
                        <option value="administrativa">Administrativa</option>
                        <option value="penal">Penal</option>
                        <option value="civil">Civil</option>
                        <option value="comercial">Comercial</option>
                        <option value="saude">Saúde</option>
                        <option value="educacao">Educação</option>
                        <option value="urbanismo">Urbanismo</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Tipo:</label>
                    <select id="typeFilter">
                        <option value="">Todos</option>
                        <option value="lei">Lei</option>
                        <option value="decreto">Decreto</option>
                        <option value="resolucao">Resolução</option>
                        <option value="portaria">Portaria</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Ano:</label>
                    <select id="yearFilter">
                        <option value="">Todos</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                        <option value="2021">2021</option>
                        <option value="2020">2020</option>
                    </select>
                </div>

                <button id="clearFilters" class="btn-clear">Limpar Filtros</button>
            </div>
        </section>

        <!-- Anúncio no meio da página -->
        <div class="middle-ads">
            <ins class="adsbygoogle" style="display:block"
                 data-ad-client="ca-pub-xxxxxxxxxxxxxxxx"
                 data-ad-slot="xxxxxxxx"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>

        <!-- Resultados -->
        <section class="results-section">
            <div id="resultsCount" class="results-count"></div>
            <div id="resultsList" class="results-list">
                <div class="loading">Carregando leis...</div>
            </div>
        </section>
    </main>

    <!-- Modal para detalhes -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
            <div class="modal-ads">
                <ins class="adsbygoogle" style="display:block"
                     data-ad-client="ca-pub-xxxxxxxxxxxxxxxx"
                     data-ad-slot="xxxxxxxx"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>LegiRJ © 2026 | Informações sobre Leis e Decretos do Estado do Rio de Janeiro</p>
        <p>⚠️ Este site é informativo. Consulte fontes oficiais para informações legais precisas.</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
