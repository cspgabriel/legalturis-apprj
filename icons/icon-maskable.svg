<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background (no rounded corners for maskable) -->
  <rect width="512" height="512" fill="url(#bg2)"/>

  <!-- Center the icon with safe zone (80% of canvas) -->
  <g transform="translate(256, 256) scale(0.7)">
    <!-- Vertical pole -->
    <rect x="-8" y="-140" width="16" height="240" rx="4" fill="url(#gold2)"/>
    <!-- Base -->
    <rect x="-60" y="100" width="120" height="20" rx="6" fill="url(#gold2)"/>
    <rect x="-80" y="115" width="160" height="14" rx="6" fill="url(#gold2)"/>
    <!-- Top bar -->
    <rect x="-130" y="-148" width="260" height="14" rx="6" fill="url(#gold2)"/>
    <!-- Chains -->
    <line x1="-110" y1="-134" x2="-110" y2="-80" stroke="url(#gold2)" stroke-width="4"/>
    <line x1="110" y1="-134" x2="110" y2="-80" stroke="url(#gold2)" stroke-width="4"/>
    <!-- Scale dishes -->
    <path d="M -160 -80 Q -110 -50 -60 -80 L -75 -55 Q -110 -35 -145 -55 Z" fill="url(#gold2)"/>
    <path d="M 60 -80 Q 110 -50 160 -80 L 145 -55 Q 110 -35 75 -55 Z" fill="url(#gold2)"/>
    <!-- Top decoration -->
    <circle cx="0" cy="-150" r="14" fill="url(#gold2)"/>
  </g>
</svg>
