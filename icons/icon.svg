<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="white" opacity="0.05"/>
  <circle cx="420" cy="420" r="120" fill="white" opacity="0.05"/>

  <!-- Balance Scale (Justice) -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Vertical pole -->
    <rect x="-8" y="-140" width="16" height="240" rx="4" fill="url(#gold)"/>

    <!-- Base -->
    <rect x="-60" y="100" width="120" height="20" rx="6" fill="url(#gold)"/>
    <rect x="-80" y="115" width="160" height="14" rx="6" fill="url(#gold)"/>

    <!-- Top horizontal bar -->
    <rect x="-130" y="-148" width="260" height="14" rx="6" fill="url(#gold)"/>

    <!-- Left chains -->
    <line x1="-110" y1="-134" x2="-110" y2="-80" stroke="url(#gold)" stroke-width="4"/>
    <line x1="-90" y1="-134" x2="-110" y2="-80" stroke="url(#gold)" stroke-width="4"/>
    <line x1="-130" y1="-134" x2="-110" y2="-80" stroke="url(#gold)" stroke-width="4"/>

    <!-- Right chains -->
    <line x1="110" y1="-134" x2="110" y2="-80" stroke="url(#gold)" stroke-width="4"/>
    <line x1="90" y1="-134" x2="110" y2="-80" stroke="url(#gold)" stroke-width="4"/>
    <line x1="130" y1="-134" x2="110" y2="-80" stroke="url(#gold)" stroke-width="4"/>

    <!-- Left scale dish -->
    <path d="M -160 -80 Q -110 -50 -60 -80 L -75 -55 Q -110 -35 -145 -55 Z" fill="url(#gold)"/>
    <ellipse cx="-110" cy="-80" rx="50" ry="8" fill="#d97706" opacity="0.6"/>

    <!-- Right scale dish -->
    <path d="M 60 -80 Q 110 -50 160 -80 L 145 -55 Q 110 -35 75 -55 Z" fill="url(#gold)"/>
    <ellipse cx="110" cy="-80" rx="50" ry="8" fill="#d97706" opacity="0.6"/>

    <!-- Top decoration -->
    <circle cx="0" cy="-150" r="14" fill="url(#gold)"/>
    <circle cx="0" cy="-150" r="6" fill="#1e3a8a"/>
  </g>

  <!-- Text "RJ" -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="60" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">RJ</text>
</svg>
