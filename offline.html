<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - LegiRJ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #6366f1 100%);
            color: white;
            padding: 2rem;
        }
        .container { text-align: center; max-width: 500px; }
        .icon { font-size: 6rem; margin-bottom: 1.5rem; opacity: 0.9; }
        h1 { font-size: 2rem; margin-bottom: 1rem; font-weight: 800; }
        p { opacity: 0.9; margin-bottom: 2rem; line-height: 1.7; }
        button {
            padding: 1rem 2rem; background: white; color: #1e3a8a;
            border: none; border-radius: 999px; cursor: pointer;
            font-weight: 700; font-size: 1rem; transition: transform 0.3s;
        }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Você está offline</h1>
        <p>Sem conexão com a internet. Mas não se preocupe! O LegiRJ funciona offline com as leis já visitadas.</p>
        <button onclick="window.location.reload()">🔄 Tentar Novamente</button>
    </div>
</body>
</html>
